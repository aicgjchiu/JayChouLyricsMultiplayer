app = "jay-chou-lyrics-game"
primary_region = "nrt"

[build]

# NOTE: This app uses in-memory state — keep machine count at 1.
# To enforce: fly scale count 1 --app jay-chou-lyrics-game --yes
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
